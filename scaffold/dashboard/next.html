<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Crucible — System 3</title>
<link rel="stylesheet" href="/vendor/system.css/style.css">
<script src="/vendor/interact.min.js"></script>
<style>
  /* ── Crucible desktop shell (overrides + additions on top of system.css) ─────────────── */
  :root{ --menubar-h:20px; --ink:#000; --paper:#fff; }
  *{ box-sizing:border-box; }
  html,body{ height:100%; margin:0; overflow:hidden; -webkit-font-smoothing:none; }
  body{ font-family:"Geneva_9","Chicago",system-ui,sans-serif; color:var(--ink);
    background:var(--paper); }
  /* desktop = the 50% dither classic pattern; the Control Panel pattern editor will replace it later */
  #desktop{ position:fixed; inset:var(--menubar-h) 0 0 0;
    background-color:var(--paper);
    background-image:repeating-conic-gradient(#000 0 25%, #fff 0 50%);
    background-size:2px 2px; overflow:hidden; }

  /* ── menu bar ── */
  #menubar{ position:fixed; top:0; left:0; right:0; height:var(--menubar-h);
    background:var(--paper); border-bottom:1px solid var(--ink); display:flex; align-items:stretch;
    z-index:9000; font-family:"Chicago",sans-serif; font-size:13px; user-select:none; }
  #menubar .mi{ display:flex; align-items:center; padding:0 11px; cursor:default; position:relative; }
  #menubar .mi:hover, #menubar .mi.open{ background:var(--ink); color:var(--paper); }
  #menubar .apple{ padding:0 9px; }
  #menubar .apple img{ width:13px; height:15px; display:block; }
  #menubar .mi.open img, #menubar .apple:hover img{ filter:invert(1); }   /* apple inverts when active */
  #menubar .clock{ margin-left:auto; padding:0 10px; font-family:"Monaco",monospace; font-size:12px; }
  .dropdown{ position:absolute; top:var(--menubar-h); left:0; min-width:210px; background:var(--paper);
    color:var(--ink); border:1px solid var(--ink); box-shadow:2px 2px 0 var(--ink); z-index:9001; padding:2px 0; display:none; }
  .dropdown.open{ display:block; }
  .dropdown .di{ display:flex; align-items:center; gap:9px; padding:3px 16px 3px 12px; font-size:13px; cursor:default; white-space:nowrap; }
  .dropdown .di:hover{ background:var(--ink); color:var(--paper); }
  .dropdown .di:hover img{ filter:invert(1); }
  .dropdown .di img{ width:16px; height:16px; }
  .dropdown .di.checked{ font-weight:bold; }
  .dropdown .sep{ border-top:1px solid var(--ink); opacity:.35; margin:3px 0; }

  /* ── windows (system.css .window, positioned + interactive) ── */
  #desktop .window{ position:absolute; display:flex; flex-direction:column; min-width:200px; min-height:110px; }
  #desktop .window .window-pane{ flex:1 1 auto; overflow:auto; margin:0; min-height:0; font-family:"Geneva_9",system-ui,sans-serif; }
  .dk-label{ font-family:"Chicago",sans-serif; font-size:11px; margin:9px 0 3px; }
  .dk-label:first-child{ margin-top:0; }
  /* ── cockpit: buttons, feed, toasts, confirm ── */
  .btnrow{ display:flex; gap:7px; flex-wrap:wrap; align-items:center; margin-top:8px; }
  .feed{ font-family:"Monaco",monospace; font-size:11px; line-height:1.55; }
  .feed-row{ white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .std-input{ font-family:"Monaco",monospace; border:1px solid var(--ink); background:var(--paper); padding:1px 4px; }
  #toasts{ position:fixed; right:14px; bottom:14px; z-index:9998; display:flex; flex-direction:column; gap:6px; }
  .toast{ background:var(--paper); border:1px solid var(--ink); box-shadow:2px 2px 0 var(--ink); padding:6px 12px;
    font-size:12px; max-width:340px; font-family:"Geneva_9",sans-serif; transition:opacity .3s; }
  .toast.err{ font-weight:bold; }
  .cfm-scrim{ position:fixed; inset:0; z-index:9999; background:rgba(0,0,0,.35); display:none; align-items:center; justify-content:center; }
  .cfm-scrim.open{ display:flex; }
  #confirm .window{ position:static; width:330px; }
  .cfm-t{ font-family:"Chicago",sans-serif; font-size:13px; margin-bottom:6px; }
  .cfm-m{ font-size:12px; line-height:1.4; }
  .win-resize{ position:absolute; right:0; bottom:0; width:16px; height:16px; cursor:nwse-resize;
    background:var(--paper); border-left:1px solid var(--ink); border-top:1px solid var(--ink); z-index:3; }
  .win-resize::after{ content:""; position:absolute; inset:3px 3px 4px 4px;
    background:repeating-linear-gradient(135deg, #000 0 1px, #fff 1px 3px); }
  .title-bar{ cursor:grab; }
  .kv{ display:flex; justify-content:space-between; gap:12px; padding:2px 0; font-size:12px; }
  .kv .k{ color:#555; } .kv .v{ font-family:"Monaco",monospace; }
  .muted{ color:#777; font-size:11px; }

  /* ── desktop icons ── */
  .dicon{ position:absolute; width:74px; text-align:center; cursor:default; user-select:none; z-index:5; }
  .dicon img{ width:32px; height:32px; display:block; margin:0 auto 2px; }
  .dicon .lbl{ font-family:"Geneva_9",sans-serif; font-size:11px; background:var(--paper); padding:0 3px; }
  .dicon.sel .lbl{ background:var(--ink); color:var(--paper); }

  /* ── boot splash ── */
  #boot{ position:fixed; inset:0; z-index:10000; background:#bbb;
    background-image:repeating-conic-gradient(#aaa 0 25%, #cfcfcf 0 50%); background-size:2px 2px;
    display:flex; align-items:center; justify-content:center; transition:opacity .4s ease; }
  #boot.gone{ opacity:0; pointer-events:none; }
  #boot .card{ background:var(--paper); border:1px solid var(--ink); box-shadow:2px 2px 0 var(--ink);
    padding:26px 40px; text-align:center; }
  #boot img{ width:48px; height:48px; image-rendering:pixelated; }
  #boot .t{ font-family:"Chicago",sans-serif; font-size:18px; margin:12px 0 4px; }
  #boot .s{ font-family:"Geneva_9",sans-serif; font-size:12px; color:#555; }
  #boot .bar{ margin:16px auto 0; width:180px; height:12px; border:1px solid var(--ink); }
  #boot .bar > span{ display:block; height:100%; width:0; background:var(--ink); transition:width .12s linear; }
</style>
</head>
<body>

<div id="boot">
  <div class="card">
    <img src="/vendor/classic-mac/happy-mac.svg" alt="">
    <div class="t">Crucible</div>
    <div class="s">Welcome to Macintosh</div>
    <div class="bar"><span id="boot-bar"></span></div>
  </div>
</div>

<div id="menubar">
  <div class="mi apple" data-menu="apple"><img src="/vendor/system.css/icon/apple.svg" alt="Apple"></div>
  <div class="mi" data-menu="view">View</div>
  <div class="clock" id="clock">Crucible</div>
</div>

<div id="desktop"></div>

<div id="toasts"></div>
<div id="confirm" class="cfm-scrim">
  <div class="window">
    <div class="title-bar"><h1 class="title">Confirm</h1></div>
    <div class="window-pane">
      <div class="cfm-t"></div><div class="cfm-m"></div>
      <div class="btnrow" style="justify-content:flex-end"><button class="btn cfm-no">Cancel</button><button class="btn btn-default cfm-ok">OK</button></div>
    </div>
  </div>
</div>

<script>
"use strict";
// ══════════════════════════════════════════════════════════════════════════════
// Crucible System-3 client — Phase 1: desktop shell + window-manager core.
// Clean, module-shaped: DATA (poll) · WM (windows) · PANELS (registry) · SHELL (menus/boot).
// Backend unchanged — reads /data, acts via /action.
// ══════════════════════════════════════════════════════════════════════════════
const $ = (s,r)=> (r||document).querySelector(s);
const el = (t,c,h)=>{ const e=document.createElement(t); if(c)e.className=c; if(h!=null)e.innerHTML=h; return e; };
const ICON = {                                   // concept -> vendored svg
  mac:"/vendor/classic-mac/classic-mac.svg", trash:"/vendor/classic-mac/trash.svg",
  floppy:"/vendor/classic-mac/floppy.svg", doc:"/vendor/classic-mac/text-file.svg",
  folder:"/vendor/pixelarticons/folder.svg", cpu:"/vendor/pixelarticons/cpu.svg",
  chart:"/vendor/pixelarticons/chart-bar-big.svg", trophy:"/vendor/pixelarticons/trophy.svg",
  book:"/vendor/pixelarticons/book-open.svg", coins:"/vendor/pixelarticons/coins.svg",
  zap:"/vendor/pixelarticons/zap.svg", clock:"/vendor/pixelarticons/clock.svg",
  play:"/vendor/pixelarticons/play.svg", search:"/vendor/pixelarticons/search.svg",
};

// ── DATA ───────────────────────────────────────────────────────────────────────
const DATA = { boxes:[], now:0, sel:null };
function curBox(){ return DATA.boxes.find(b=>b.nick===DATA.sel) || DATA.boxes[0] || null; }
async function poll(){
  try{
    const d = await (await fetch("/data",{cache:"no-store"})).json();
    if(d.error) return;
    DATA.boxes=d.boxes||[]; DATA.now=d.now;
    if(!DATA.sel || !DATA.boxes.some(b=>b.nick===DATA.sel)) DATA.sel=(DATA.boxes[0]||{}).nick||null;
    WM.renderAll();
    Shell.tickClock();
  }catch(e){ /* stay up; retry next tick */ }
}

// ── WM : the window manager core ────────────────────────────────────────────────
const WM = {
  desk: null, z: 20, open: {},                    // id -> {win, pane, def}
  POS: JSON.parse(localStorage.getItem("cru3-pos")||"{}"),
  OPENSET: JSON.parse(localStorage.getItem("cru3-open")||"null"),
  MENUBAR_H: 20, GAP: 10,

  init(){ this.desk=$("#desktop"); },
  saveOpen(){ localStorage.setItem("cru3-open", JSON.stringify(Object.keys(this.open))); },
  savePos(){ localStorage.setItem("cru3-pos", JSON.stringify(this.POS)); },

  geom(id){                                        // saved -> LAYOUT -> cascade
    if(this.POS[id]) return this.POS[id];
    const L = (PANELS[id]||{}).layout;
    if(L) return L;
    const n=Object.keys(this.open).length; return { x:24+n*26, y:24+n*22, w:320, h:220 };
  },
  focus(win){ win.style.zIndex=(++this.z); },

  openWin(id){
    const def = PANELS[id]; if(!def) return;
    if(this.open[id]){ this.focus(this.open[id].win); return; }
    const g = this.geom(id);
    const win = el("div","window");
    win.style.left=g.x+"px"; win.style.top=g.y+"px"; win.style.width=g.w+"px"; win.style.height=g.h+"px";
    win.innerHTML =
      '<div class="title-bar">'+
        '<button aria-label="Close" class="close"></button>'+
        '<h1 class="title">'+def.title+'</h1>'+
        '<button aria-label="Resize" class="resize" style="visibility:hidden"></button>'+
      '</div>'+
      (def.details? '<div class="details-bar"><span class="details-bar-text" id="det-'+id+'"></span></div>':'')+
      '<div class="window-pane" id="pane-'+id+'"></div>'+
      '<div class="win-resize"></div>';
    this.desk.appendChild(win);
    const rec = { win, pane:$("#pane-"+id, win), det:$("#det-"+id, win), def };
    this.open[id]=rec;
    win.addEventListener("mousedown", ()=>this.focus(win));
    $(".close",win).addEventListener("click", (e)=>{ e.stopPropagation(); this.closeWin(id); });
    this._wireInteract(id, win);
    this.focus(win); this.render(id); this.saveOpen(); Shell.syncMenu();
    return rec;
  },
  closeWin(id){ const r=this.open[id]; if(!r)return; r.win.remove(); delete this.open[id]; this.saveOpen(); Shell.syncMenu(); },

  _wireInteract(id, win){
    const self=this;
    function persist(){ self.POS[id]={ x:parseFloat(win.style.left)||0, y:parseFloat(win.style.top)||0,
      w:parseFloat(win.style.width)||320, h:parseFloat(win.style.height)||220 }; self.savePos(); }
    interact(win)
      .draggable({ allowFrom:".title-bar", ignoreFrom:".close,.resize",
        listeners:{ start(){ self.focus(win); },
          move(e){ const x=Math.max(0,(parseFloat(win.style.left)||0)+e.dx),
                          y=Math.max(self.MENUBAR_H,(parseFloat(win.style.top)||0)+e.dy);
                   win.style.left=Math.round(x)+"px"; win.style.top=Math.round(y)+"px"; },
          end:persist } })
      .resizable({ edges:{ right:true, bottom:true }, allowFrom:".win-resize,.window",
        listeners:{ start(){ self.focus(win); },
          move(e){ win.style.width=Math.max(200,Math.round(e.rect.width))+"px";
                   win.style.height=Math.max(110,Math.round(e.rect.height))+"px"; },
          end:persist } });
    // let the corner grip proxy the window's bottom-right resize
    $(".win-resize",win).addEventListener("mousedown", ()=>self.focus(win));
  },

  render(id){ const r=this.open[id]; if(!r)return; const b=curBox();
    try{ r.def.render(b, r.pane, r.det); }catch(e){ r.pane.innerHTML='<div class="muted">render error: '+e.message+'</div>'; } },
  renderAll(){ Object.keys(this.open).forEach(id=>this.render(id)); },

  tile(){                                          // Clean Up — arrange open windows in a grid
    const ids=Object.keys(this.open); if(!ids.length)return;
    const W=this.desk.clientWidth, H=this.desk.clientHeight;
    const cols=Math.ceil(Math.sqrt(ids.length)), rows=Math.ceil(ids.length/cols);
    const cw=Math.floor((W-this.GAP*(cols+1))/cols), ch=Math.floor((H-this.GAP*(rows+1))/rows);
    ids.forEach((id,i)=>{ const c=i%cols, r=Math.floor(i/cols), w=this.open[id].win;
      const x=this.GAP+c*(cw+this.GAP), y=this.GAP+r*(ch+this.GAP);
      w.style.left=x+"px"; w.style.top=y+"px"; w.style.width=cw+"px"; w.style.height=ch+"px";
      this.POS[id]={x,y,w:cw,h:ch}; });
    this.savePos();
  },
  restore(){                                       // open the saved set (or the default) at boot
    const ids = (this.OPENSET && this.OPENSET.length) ? this.OPENSET : DEFAULT_OPEN;
    ids.forEach(id=> PANELS[id] && this.openWin(id));
  },
};

// ── DRAW : the shared 1-bit drawing kit — dither/hatch SVG; EVERY chart goes through here ──
function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
const Draw = {
  PATTERNS:'<defs>'+
    '<pattern id="p-hatch" width="4" height="4" patternUnits="userSpaceOnUse"><path d="M0,4L4,0" stroke="#000" stroke-width="1"/></pattern>'+
    '<pattern id="p-hatch2" width="4" height="4" patternUnits="userSpaceOnUse"><path d="M0,0L4,4" stroke="#000" stroke-width="1"/></pattern>'+
    '<pattern id="p-dither" width="2" height="2" patternUnits="userSpaceOnUse"><rect width="1" height="1"/><rect x="1" y="1" width="1" height="1"/></pattern>'+
    '<pattern id="p-dots" width="4" height="4" patternUnits="userSpaceOnUse"><rect width="1" height="1"/></pattern></defs>',
  FILLS:["#000","url(#p-hatch)","url(#p-dither)","url(#p-hatch2)","url(#p-dots)"],
  _wrap(w,h,inner,fit){ return '<svg viewBox="0 0 '+w+' '+h+'" width="100%" height="'+h+'" preserveAspectRatio="'+(fit||"none")+'" style="display:block;font-family:Geneva_9,system-ui,sans-serif;overflow:visible">'+this.PATTERNS+inner+'</svg>'; },
  progressBar(host,o){ o=o||{}; const w=220,h=o.h||14,p=Math.max(0,Math.min(1,(o.value||0)/(o.max||1)));
    host.innerHTML=this._wrap(w,h,'<rect x="0.5" y="0.5" width="'+(w-1)+'" height="'+(h-1)+'" fill="none" stroke="#000"/><rect x="1.5" y="1.5" width="'+((w-3)*p)+'" height="'+(h-3)+'" fill="#000"/>'); },
  gauge(host,o){ o=o||{}; const w=200,h=o.h||16,segs=o.segs||12,on=Math.round(Math.max(0,Math.min(1,(o.value||0)/(o.max||1)))*segs),sw=(w-1)/segs; let inner='';
    for(let i=0;i<segs;i++) inner+='<rect x="'+(0.5+i*sw)+'" y="0.5" width="'+(sw-1)+'" height="'+(h-1)+'" fill="'+(i<on?"#000":"url(#p-dither)")+'" stroke="#000" stroke-width="0.5"/>';
    host.innerHTML=this._wrap(w,h,inner); },
  bar(host,o){ o=o||{}; const data=o.data||[],w=300,barH=15,gap=7,labelW=o.labelW||78,max=o.max||Math.max(1,...data.map(d=>d.value||0)),h=Math.max(20,gap+data.length*(barH+gap)); let inner='';
    data.forEach((d,i)=>{ const y=gap+i*(barH+gap),bw=Math.max(0,(w-labelW-40)*((d.value||0)/max));
      inner+='<text x="0" y="'+(y+barH-3)+'" font-size="11">'+esc(d.label)+'</text><rect x="'+labelW+'" y="'+y+'" width="'+bw+'" height="'+barH+'" fill="'+this.FILLS[i%this.FILLS.length]+'" stroke="#000"/><text x="'+(labelW+bw+4)+'" y="'+(y+barH-3)+'" font-size="10" font-family="Monaco">'+(d.value)+'</text>'; });
    host.innerHTML=this._wrap(w,h,inner,"xMinYMin meet"); },
  scatter(host,o){ o=o||{}; const pts=o.points||[],w=340,h=o.h||190; if(!pts.length){host.innerHTML='';return;}
    const pl=32,pr=10,pt=10,pb=24,xs=pts.map(p=>p.x),ys=pts.map(p=>p.y); let xmin=Math.min(...xs),xmax=Math.max(...xs),ymin=Math.min(...ys),ymax=Math.max(...ys);
    if(xmin===xmax){xmin-=1;xmax+=1;} if(ymin===ymax){ymin-=1;ymax+=1;}
    const sx=v=>pl+((v-xmin)/(xmax-xmin))*(w-pl-pr),sy=v=>(h-pb)-((v-ymin)/(ymax-ymin))*(h-pb-pt);
    let inner='<line x1="'+pl+'" y1="'+pt+'" x2="'+pl+'" y2="'+(h-pb)+'" stroke="#000"/><line x1="'+pl+'" y1="'+(h-pb)+'" x2="'+(w-pr)+'" y2="'+(h-pb)+'" stroke="#000"/>';
    pts.forEach(p=>{ const x=sx(p.x),y=sy(p.y); if(p.ring) inner+='<circle cx="'+x+'" cy="'+y+'" r="5" fill="none" stroke="#000"/>';
      inner+='<rect x="'+(x-2)+'" y="'+(y-2)+'" width="4" height="4" fill="#000"/>'+(p.label?'<text x="'+(x+7)+'" y="'+(y+3)+'" font-size="9">'+esc(p.label)+'</text>':''); });
    inner+='<text x="'+((pl+w-pr)/2)+'" y="'+(h-5)+'" font-size="9" text-anchor="middle">'+esc(o.xlab||'')+'</text>';
    host.innerHTML=this._wrap(w,h,inner,"xMidYMid meet"); },
  sparkline(host,o){ o=o||{}; const d=o.data||[],w=120,h=o.h||22; if(d.length<2){host.innerHTML='';return;}
    const mn=Math.min(...d),mx=Math.max(...d),pts=d.map((v,i)=>((i/(d.length-1))*(w-2)+1)+','+(((h-2)-((v-mn)/((mx-mn)||1))*(h-4))+1)).join(' ');
    host.innerHTML=this._wrap(w,h,'<polyline points="'+pts+'" fill="none" stroke="#000" stroke-width="1"/>'); },
};

// ── write-API plumbing (POST /action) + toasts + confirm dialog ──────────────────
function fmtTok(n){ n=n||0; return n>=1e6?(n/1e6).toFixed(1)+"M":n>=1e3?(n/1e3).toFixed(1)+"k":String(n); }
function fmtAgo(ep){ if(!ep)return"—"; const s=Math.max(0,Date.now()/1000-ep); return s<90?Math.round(s)+"s ago":s<5400?Math.round(s/60)+"m ago":Math.round(s/3600)+"h ago"; }
const API = { async post(action, params){ const b=curBox()||{}; const box=b.box_dir||b.nick;
  try{ const r=await fetch("/action/"+action,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(Object.assign({box},params||{}))}); return await r.json(); }
  catch(e){ return {ok:false,error:String(e)}; } } };
const Toast = { show(msg, ok){ const t=el("div","toast "+(ok?"ok":"err")); t.textContent=msg; $("#toasts").appendChild(t);
  setTimeout(()=>{ t.style.opacity="0"; setTimeout(()=>t.remove(),300); }, ok?3200:6000); } };
const Confirm = { _res:null,
  wire(){ const s=$("#confirm"); $(".cfm-ok",s).addEventListener("click",()=>this._close(true));
    $(".cfm-no",s).addEventListener("click",()=>this._close(false));
    s.addEventListener("click",e=>{ if(e.target===s) this._close(false); }); },
  ask(t,m){ return new Promise(res=>{ this._res=res; const s=$("#confirm"); $(".cfm-t",s).textContent=t; $(".cfm-m",s).textContent=m; s.classList.add("open"); }); },
  _close(v){ $("#confirm").classList.remove("open"); if(this._res){ this._res(v); this._res=null; } } };
const Actions = { async run(action, params, confirm){
  if(confirm && !(await Confirm.ask(confirm.t, confirm.m))) return {cancelled:true};
  const r = await API.post(action, params);
  Toast.show(r.ok ? (r.message || (action+" ✓")) : (r.error || (action+" failed")), r.ok);
  poll(); return r; } };
const T_COST = [];                                   // rolling cost history for the telemetry sparkline
const Cockpit = {
  init(){ Confirm.wire();
    document.addEventListener("click", (e)=>{
      const rb=e.target.closest("[data-run]"); if(rb){ this.runAction(rb.getAttribute("data-run")); return; }
      const hw=e.target.closest("[data-hw]"); if(hw){ Actions.run("hw-refresh"); return; }
    });
  },
  runAction(a){
    const hrs = ()=> parseFloat(($("#run-hrs")||{}).value) || 18;
    const M = {
      pause:{a:"pause"}, resume:{a:"resume"},
      clean:{a:"stop", p:{graceful:true}, c:{t:"Clean stop?", m:"Finish the current unit, then consolidate + write the FINAL report (nothing lost)."}},
      force:{a:"stop", p:{}, c:{t:"Force stop?", m:"Kill the in-flight unit now, then still consolidate + write the report."}},
      kill:{a:"hard-kill", p:{}, c:{t:"Hard kill?", m:"Terminate driver + unit immediately — NO consolidate or report. Escape hatch only."}},
      start:{a:"run-start", p:{hours:hrs()}, c:{t:"Start a run?", m:"Launches a "+hrs()+"h window and spends real weekly cap."}},
    }[a];
    if(M) Actions.run(M.a, M.p, M.c);
  },
};

// ── PANELS registry (Phase 1: proof windows; more land in later phases) ──────────
function fmtDur(s){ if(s==null)return"—"; if(s<0)return"overdue"; return Math.floor(s/3600)+"h "+Math.floor(s%3600/60)+"m"; }
function fmtClock(ep){ if(!ep)return"—"; const d=new Date(ep*1000); return d.toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"}); }
const PANELS = {
  window: { title:"Window status", icon:ICON.clock, layout:{x:24,y:24,w:300,h:200}, details:true,
    render(b, pane, det){ if(!b){ pane.innerHTML='<div class="muted">no campaign data</div>'; return; }
      const w=b.window||{}, c=b.campaign||{}, state=(w.state||c.state||"?");
      if(det) det.textContent = state+"  ·  "+(b.nick||"");
      pane.innerHTML =
        '<div class="kv"><span class="k">state</span><span class="v">'+state+'</span></div>'+
        '<div class="kv"><span class="k">to winddown</span><span class="v">'+fmtDur(b.remaining_winddown_s)+'</span></div>'+
        '<div class="kv"><span class="k">to deadline</span><span class="v">'+fmtDur(b.remaining_s)+'</span></div>'+
        '<div class="kv"><span class="k">deadline</span><span class="v">'+fmtClock(c.deadline_epoch)+'</span></div>'; } },
  run: { title:"Run control", icon:ICON.play, layout:{x:24,y:24,w:300,h:150},
    render(b, pane, det){
      const st=(b&&((b.window||{}).state||(b.campaign||{}).state))||"idle", paused=!!(b&&b.paused), running=st==="running";
      if(det) det.textContent = paused?"paused":running?"running":st;
      pane.innerHTML = running
        ? '<div class="btnrow">'+(paused?'<button class="btn btn-default" data-run="resume">Resume</button>':'<button class="btn" data-run="pause">Pause</button>')+
          '<button class="btn" data-run="clean">Clean stop</button><button class="btn" data-run="force">Force stop</button><button class="btn" data-run="kill">Hard-kill</button></div>'
        : '<div class="btnrow"><input class="std-input" id="run-hrs" value="18" style="width:40px"> hrs <button class="btn btn-default" data-run="start">Start run</button></div><div class="muted" style="margin-top:8px">state: '+esc(st)+'</div>'; } },
  agent: { title:"Live agent", icon:ICON.zap, layout:{x:24,y:190,w:340,h:230}, details:true,
    render(b, pane, det){ const a=(b||{}).agent||{}, live=a.live||{};
      if(det) det.textContent = (live.running?"running":"idle")+" · unit #"+(live.num||a.current_unit||"—");
      const rows=(live.events||[]).slice(-12).map(e=>{ const tool=e.kind==="tool"; const t=esc((e.text||e.description||"").replace(/\s+/g," ").slice(0,90));
        return '<div class="feed-row">'+(tool?"$":"◇")+' '+t+'</div>'; }).join("");
      pane.innerHTML = '<div class="feed">'+(rows||'<div class="muted">no live unit — the feed streams while a unit runs</div>')+'</div>'; } },
  telemetry: { title:"Telemetry", icon:ICON.coins, layout:{x:380,y:24,w:270,h:270},
    render(b, pane){ const a=(b||{}).agent||{}, tw=a.tokens_window||{};
      pane.innerHTML =
        '<div class="dk-label">decode tok/s — '+(a.tok_s_window!=null?a.tok_s_window:"—")+'</div><div id="tl-toks"></div>'+
        '<div class="dk-label">context fill — '+(a.ctx_window?Math.round((a.ctx_peak_window||0)/a.ctx_window*100):0)+'%</div><div id="tl-ctx"></div>'+
        '<div class="kv"><span class="k">output tok</span><span class="v">'+fmtTok(tw.output||0)+'</span></div>'+
        '<div class="dk-label">cost / window — $'+((a.cost_window_usd||0).toFixed(2))+'</div><div id="tl-cost"></div>';
      Draw.gauge($("#tl-toks",pane), {value:a.tok_s_window||0, max:200});
      Draw.progressBar($("#tl-ctx",pane), {value:(a.ctx_window?(a.ctx_peak_window||0)/a.ctx_window*100:0), max:100});
      const c=a.cost_window_usd||0; if(!T_COST.length || T_COST[T_COST.length-1]!==c){ T_COST.push(c); if(T_COST.length>40)T_COST.shift(); }
      Draw.sparkline($("#tl-cost",pane), {data:T_COST.slice(), h:26}); } },
  hardware: { title:"Box hardware", icon:ICON.cpu, layout:{x:676,y:24,w:280,h:280}, details:true,
    render(b, pane, det){ const hw=(b||{}).hardware_live;
      if(det) det.textContent = hw ? ("updated "+fmtAgo(hw.epoch)) : "on-demand";
      let h='<div class="btnrow"><button class="btn" data-hw="refresh">⟳ Refresh</button><span class="muted">'+(hw?"":"hit Refresh")+'</span></div>';
      if(hw){ const cpu=hw.cpu||{}, mem=hw.mem_mib||{}, gpu=hw.gpu||{}, d0=(hw.disk||[])[0]||{};
        h+='<div class="dk-label">disk — '+(d0.avail||"?")+" free · "+(d0.pct||"?")+'</div><div id="hw-disk"></div>'+
           '<div class="dk-label">mem — '+((mem.used||0)/1024).toFixed(1)+" / "+((mem.total||0)/1024).toFixed(1)+' G</div><div id="hw-mem"></div>'+
           '<div class="dk-label">cpu — '+(cpu.load1!=null?cpu.load1+" load":"")+(cpu.temp_c&&cpu.temp_c!=="null"?" · "+cpu.temp_c+"°C":"")+'</div><div id="hw-cpu"></div>'+
           (gpu.util!=null?'<div class="dk-label">gpu — '+gpu.util+"%"+(gpu.temp!=null?" · "+gpu.temp+"°C":"")+'</div><div id="hw-gpu"></div>':""); }
      pane.innerHTML=h;
      if(hw){ const cpu=hw.cpu||{}, mem=hw.mem_mib||{}, gpu=hw.gpu||{}, d0=(hw.disk||[])[0]||{};
        Draw.gauge($("#hw-disk",pane), {value:parseInt(d0.pct)||0, max:100});
        Draw.gauge($("#hw-mem",pane), {value:mem.total?(mem.used/mem.total*100):0, max:100});
        Draw.gauge($("#hw-cpu",pane), {value:cpu.cores?(cpu.load1/cpu.cores*100):0, max:100});
        if(gpu.util!=null) Draw.gauge($("#hw-gpu",pane), {value:gpu.util, max:100}); } } },
  pareto: { title:"Pareto frontier", icon:ICON.chart, layout:{x:24,y:24,w:390,h:290},
    render(b, pane){ const front=((b||{}).front||[]);
      const pts=front.map(f=>({ x:f.decode_tok_s||0, y:f.quality||0, ring:f.status==="blessed", label:(f.model||"").split("-").slice(0,1)[0] }));
      pane.innerHTML='<div class="muted" style="margin-bottom:2px">decode tok/s × quality · ring = blessed</div><div id="pl"></div>';
      if(pts.length) Draw.scatter($("#pl",pane), {points:pts, xlab:"decode tok/s", h:235});
      else pane.innerHTML+='<div class="muted">no front yet</div>'; } },
  leaderboard: { title:"Decode leaderboard", icon:ICON.trophy, layout:{x:430,y:24,w:340,h:260},
    render(b, pane){ const seen={}, rows=[];
      ((b||{}).models||[]).forEach(m=>{ const v=Math.max(m.gpu_decode||0,m.cpu_decode||0); if(!v)return;
        const name=(m.model||"?").replace(/-Instruct|-Distill/g,"").split("-").slice(0,2).join("-")+" "+(m.quant||"");
        if(!seen[name]||seen[name]<v){ seen[name]=v; } });
      Object.keys(seen).map(n=>({label:n.slice(0,20),value:+seen[n].toFixed(1)})).sort((a,b)=>b.value-a.value).slice(0,8).forEach(r=>rows.push(r));
      pane.innerHTML='<div class="muted" style="margin-bottom:2px">top decode (tok/s)</div><div id="lb"></div>';
      Draw.bar($("#lb",pane), {data:rows, labelW:150}); } },
  ledger: { title:"Ledger composition", icon:ICON.book, layout:{x:24,y:24,w:300,h:220},
    render(b, pane, det){ const c=(b||{}).counts||{}, total=Object.values(c).reduce((a,x)=>a+(x||0),0);
      if(det) det.textContent = total+" records";
      const data=[["blessed",c.blessed],["contender",c.contender],["failed",c.failed],["degenerate",c.degenerate]]
        .filter(d=>d[1]!=null).map(d=>({label:d[0],value:d[1]}));
      pane.innerHTML='<div id="lc"></div>'; Draw.bar($("#lc",pane), {data, labelW:88}); }, details:true },
  readout: { title:"Readout", icon:ICON.trophy, layout:{x:340,y:24,w:280,h:230},
    render(b, pane){ const best=(b||{}).best||{};
      const row=(k,label,unit)=>{ const x=best[k]; if(!x)return ""; const cfg=x.config||{};
        return '<div class="dk-label">'+label+'</div><div class="kv" style="border:0;padding:0"><span class="v" style="font-size:15px">'+x.value+" "+(unit||"")+'</span></div><div class="muted feed-row">'+esc((cfg.model||"")+" "+(cfg.quant||""))+'</div>'; };
      pane.innerHTML = (row("decode","decode peak","tok/s")+row("prefill","prefill peak","tok/s")+row("quality","quality peak","")+row("agentic","agentic peak","")) || '<div class="muted">no results yet</div>'; } },
  drawkit: { title:"Drawing Kit", icon:ICON.chart, layout:{x:30,y:250,w:400,h:370},
    render(b, pane){
      pane.innerHTML =
        '<div class="dk-label">progressBar — window elapsed</div><div id="dk-prog"></div>'+
        '<div class="dk-label">gauge — decode tok/s</div><div id="dk-gauge"></div>'+
        '<div class="dk-label">bar — ledger composition</div><div id="dk-bar"></div>'+
        '<div class="dk-label">scatter — Pareto (decode × quality)</div><div id="dk-scat"></div>'+
        '<div class="dk-label">sparkline — cost trend</div><div id="dk-spark"></div>';
      Draw.progressBar($("#dk-prog",pane), {value:70, max:100});
      Draw.gauge($("#dk-gauge",pane), {value:74, max:200});
      Draw.bar($("#dk-bar",pane), {data:[{label:"contender",value:203},{label:"blessed",value:4},{label:"failed",value:119},{label:"degen",value:9}]});
      Draw.scatter($("#dk-scat",pane), {points:[{x:150,y:1012,label:"Qwen0.5B",ring:true},{x:45,y:1078,label:"Llama3B",ring:true},{x:45,y:1065,ring:true},{x:24,y:1110,label:"DS7B",ring:true}], xlab:"decode tok/s"});
      Draw.sparkline($("#dk-spark",pane), {data:[6,6.5,6.8,7,7.1,7,6.9,7.1,7.3,7.4]});
    } },
};
const DEFAULT_OPEN = ["run","agent","telemetry","hardware"];   // the cockpit (operator's chosen default view)

// ── SHELL : menu bar, apple launcher, clock, boot ────────────────────────────────
const Shell = {
  init(){
    const bar=$("#menubar");
    this.aDrop = this._dropdown(bar.querySelector('[data-menu="apple"]'));
    this.vDrop = this._dropdown(bar.querySelector('[data-menu="view"]'));
    this.vDrop.innerHTML =
      '<div class="di" data-act="cleanup">Clean Up Windows</div>'+
      '<div class="di" data-act="closeall">Close All Windows</div>';
    this.buildApple();
    bar.addEventListener("click",(e)=>{ const mi=e.target.closest(".mi"); if(!mi)return; e.stopPropagation(); this._toggle(mi); });
    document.addEventListener("click",()=>this._closeMenus());
    this.aDrop.addEventListener("click",(e)=>{ const di=e.target.closest(".di"); if(!di)return;
      if(di.dataset.open) WM.openWin(di.dataset.open); });
    this.vDrop.addEventListener("click",(e)=>{ const di=e.target.closest(".di"); if(!di)return;
      if(di.dataset.act==="cleanup") WM.tile();
      if(di.dataset.act==="closeall") Object.keys(WM.open).forEach(id=>WM.closeWin(id)); });
  },
  _dropdown(mi){ const d=el("div","dropdown"); mi.appendChild(d); return d; },
  _toggle(mi){ const d=mi.querySelector(".dropdown"); if(!d)return; const wasOpen=d.classList.contains("open");
    this._closeMenus(); if(!wasOpen){ d.classList.add("open"); mi.classList.add("open"); } },
  _closeMenus(){ document.querySelectorAll("#menubar .mi.open").forEach(m=>m.classList.remove("open"));
    document.querySelectorAll(".dropdown.open").forEach(d=>d.classList.remove("open")); },
  buildApple(){
    let h='<div class="di" data-open="__about">About Crucible…</div><div class="sep"></div>';
    for(const id in PANELS){ const p=PANELS[id];
      h+='<div class="di win-item" data-open="'+id+'"><img src="'+(p.icon||ICON.folder)+'">'+p.title+'</div>'; }
    this.aDrop.innerHTML=h; this.syncMenu();
  },
  syncMenu(){ this.aDrop.querySelectorAll(".win-item").forEach(di=>di.classList.toggle("checked", !!WM.open[di.dataset.open])); },
  tickClock(){ const b=curBox(); const rem=b&&b.remaining_s; const c=$("#clock");
    c.textContent = (b?b.nick:"Crucible") + (rem!=null? "  "+fmtDur(rem) : ""); },
};

// ── BOOT ─────────────────────────────────────────────────────────────────────────
function boot(){
  WM.init(); Shell.init(); Cockpit.init();
  let p=0; const bar=$("#boot-bar");
  const iv=setInterval(()=>{ p=Math.min(100,p+14); bar.style.width=p+"%";
    if(p>=100){ clearInterval(iv); $("#boot").classList.add("gone");
      WM.restore(); poll(); setInterval(poll, 4000); } }, 90);
}
boot();
</script>
